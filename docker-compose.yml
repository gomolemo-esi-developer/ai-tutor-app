version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
    container_name: tutorverse-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - tutorverse
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: tutorverse-backend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID:-}
      - ENVIRONMENT=production
      - RAG_SERVICE_URL=http://rag-service:8000
      - RAG_ENABLE=true
      - RAG_TIMEOUT=30000
      - RAG_RETRY_ATTEMPTS=3
    env_file:
      - .env.backend
    depends_on:
      rag-service:
        condition: service_healthy
    networks:
      - tutorverse
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rag-service:
    build:
      context: .
      dockerfile: ./Dockerfile.rag
    container_name: tutorverse-rag
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - CHROMA_PERSIST_DIR=/app/chroma_db
    env_file:
      - ./RAG18Nov2025-1/.env
    volumes:
      - chroma_data:/app/chroma_db
      - rag_data:/app/data
    networks:
      - tutorverse
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma_data:
    driver: local
  rag_data:
    driver: local

networks:
  tutorverse:
    driver: bridge
